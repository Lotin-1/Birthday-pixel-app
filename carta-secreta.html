<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Carta Secreta</title>

<style>
body {
  margin: 0;
  background: #cf96c6;
  font-family: Arial;
  overflow: hidden;
}

.screen {
  display: none;
  justify-content: center;
  align-items: center;
  height: 100vh;
  flex-direction: column;
}
.active { display: flex; }

.keypad {
  display: grid;
  grid-template-columns: repeat(3, 60px);
  gap: 10px;
}

.key {
  padding: 15px;
  border: none;
  border-radius: 10px;
  background: #f8bbd0;
  font-size: 18px;
  cursor: pointer;
}

.input-display {
  font-size: 24px;
  margin: 15px;
  letter-spacing: 8px;
}

.notepad {
  background: #fff0f6;
  border: 3px solid #f8bbd0;
  padding: 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 500px;
  font-family: 'Comic Sans MS';
}

#text {
  font-style: italic;
}

.btn {
  margin-top: 15px;
  padding: 10px;
  border: none;
  background: #f48fb1;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

.burbuja {
  position: absolute;
  bottom: -50px;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
  animation: subir 6s linear infinite;
}

@keyframes subir {
  to { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<audio id="music" src="img/Happy.mp3" loop></audio>

<!-- contraseña -->
<div id="passwordScreen" class="screen active">
  <h2>Enter password</h2>
  <div class="input-display" id="inputDisplay">••••</div>
  <!-- pista de el dia de nacimiento y la edad que tiene -->
  <p id="pista" style="color:#ffffff;"></p>
  <div class="keypad">
    <button class="key" onclick="enterDigit('1')">1</button>
    <button class="key" onclick="enterDigit('2')">2</button>
    <button class="key" onclick="enterDigit('3')">3</button>
    <button class="key" onclick="enterDigit('4')">4</button>
    <button class="key" onclick="enterDigit('5')">5</button>
    <button class="key" onclick="enterDigit('6')">6</button>
    <button class="key" onclick="enterDigit('7')">7</button>
    <button class="key" onclick="enterDigit('8')">8</button>
    <button class="key" onclick="enterDigit('9')">9</button>
    <div></div>
    <button class="key" onclick="enterDigit('0')">0</button>
    <div></div>
  </div>
</div>

<!-- carta -->
<div id="notepadScreen" class="screen">
  <div class="notepad">
    <h3>💌 Para ti</h3>
    <p id="text"></p>

    <!-- botón de salida, mas que salida es para volver al password-->
    <button class="btn" onclick="volverInicio()">Salir </button>
  </div>
</div>

<script>
const correctPassword = '2620';
let input = '';

const mensaje = `No sabía cómo empezar esta carta, pero sí sabía algo:
Aqui escribes todo lo que deses decir.`;

/* contraseña */
function enterDigit(d) {
  if (input.length < 4) input += d;

  document.getElementById('inputDisplay').textContent = input.padEnd(4,'•');

  if (input.length === 4) {
    if (input === correctPassword) {
      document.getElementById('passwordScreen').classList.remove('active');
      document.getElementById('notepadScreen').classList.add('active');

      escribirTexto();
      document.getElementById("music").play();
    } else {
      input = '';
      document.getElementById('inputDisplay').textContent = '••••';

      const pista = document.getElementById("pista");
      pista.textContent = " Pista: cumpleaños + edad 🎂";

      setTimeout(() => {
        pista.textContent = "";
      }, 4000);
    }
  }
}

/* volver */
function volverInicio() {
  document.getElementById('notepadScreen').classList.remove('active');
  document.getElementById('passwordScreen').classList.add('active');

  document.getElementById("text").innerHTML = "";
  input = '';
  document.getElementById('inputDisplay').textContent = '••••';

  document.getElementById("music").pause();
}

/* máquina escribir */
function escribirTexto() {
  let i = 0;

  function escribir() {
    if (i < mensaje.length) {
      document.getElementById("text").innerHTML += mensaje.charAt(i);
      i++;
      setTimeout(escribir, 40);
    }
  }

  escribir();
}

/* burbujas */
function crearBurbujas() {
  setInterval(() => {
    let b = document.createElement("div");
    b.className = "burbuja";

    let s = Math.random()*20+10;
    b.style.width = s+"px";
    b.style.height = s+"px";
    b.style.left = Math.random()*window.innerWidth+"px";

    document.body.appendChild(b);

    setTimeout(()=>b.remove(),6000);
  },300);
}

crearBurbujas();
</script>

</body>
</html>
